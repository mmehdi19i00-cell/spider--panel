{% extends "base.html" %}
{% block title %}System - Spider Panel{% endblock %}

{% block content %}
<div id="app-view" class="app-shell">
  <!-- Sidebar -->
  <aside class="sidebar glass" id="sidebar">
    <div class="side-brand">
      <span class="spider-mini" aria-hidden="true">
        <svg viewBox="0 0 32 32" fill="currentColor" width="24" height="24">
          <path d="M16 2 L6 10 L6 22 L16 30 L26 22 L26 10 Z M16 6 L22 14 L22 22 L16 28 L10 22 L10 14 Z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
          <circle cx="16" cy="16" r="4" fill="currentColor"/>
        </svg>
      </span> SPIDER
    </div>
    <nav class="nav">
      <a class="nav-item" data-view="dashboard"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span> Dashboard</a>
      <a class="nav-item" data-view="users"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> Users</a>
      <a class="nav-item" data-view="inbounds"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span> Inbounds</a>
      <a class="nav-item" data-view="domains"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></span> Domains</a>
      <a class="nav-item active" data-view="system"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span> System</a>
      <a class="nav-item" data-view="logs"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M4 13h16"/><path d="M4 19h16"/></svg></span> Xray Logs</a>
      <a class="nav-item" data-view="settings"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span> Settings</a>
    </nav>
    <div class="side-foot">
      <button id="theme-toggle" class="btn btn-ghost" title="Toggle theme"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg> Theme</button>
      <button id="logout-btn" class="btn btn-ghost danger"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="topbar glass">
      <button id="menu-btn" class="btn btn-ghost only-mobile" aria-label="Menu"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <h2 id="view-title">System</h2>
      <div class="topbar-right">
        <span id="xray-status" class="pill">Xray: …</span>
        <span id="me-name" class="me"></span>
      </div>
    </header>

    <div class="content" id="content">
      <!-- System content loads here -->
    </div>
  </main>
</div>

<!-- Modal -->
<div id="modal" class="modal-backdrop" hidden>
  <div class="modal glass" id="modal-card"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  // System view renderer
  async function renderSystem() {
    try {
      const s = await api('/system/info');
      
      const html = `
        <div class="panel glass">
          <h3>SYSTEM INFORMATION</h3>
          <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr))">
            <div><div class="k">Hostname</div><div class="v" style="font-size:16px">${esc(s.hostname || '—')}</div></div>
            <div><div class="k">Platform</div><div class="v" style="font-size:16px">${esc(s.platform || '—')}</div></div>
            <div><div class="k">Python</div><div class="v" style="font-size:16px">${esc(s.python_version || '—')}</div></div>
            <div><div class="k">Architecture</div><div class="v" style="font-size:16px">${esc(s.arch || '—')}</div></div>
          </div>
        </div>
        
        <div class="panel glass" style="margin-top:16px">
          <h3>RESOURCE USAGE</h3>
          <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr))">
            <div><div class="k">CPU</div><div class="v" style="font-size:24px">${s.cpu_percent != null ? s.cpu_percent.toFixed(1) + '%' : '—'}</div></div>
            <div><div class="k">Memory</div><div class="v" style="font-size:24px">${s.memory_percent != null ? s.memory_percent.toFixed(1) + '%' : '—'}</div></div>
            <div><div class="k">Memory Used</div><div class="v" style="font-size:16px">${s.memory_used ? fmtBytes(s.memory_used) : '—'}</div></div>
            <div><div class="k">Memory Total</div><div class="v" style="font-size:16px">${s.memory_total ? fmtBytes(s.memory_total) : '—'}</div></div>
          </div>
        </div>
        
        <div class="panel glass" style="margin-top:16px">
          <h3>DISK USAGE</h3>
          <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr))">
            <div><div class="k">Total</div><div class="v" style="font-size:16px">${s.disk_total ? fmtBytes(s.disk_total) : '—'}</div></div>
            <div><div class="k">Used</div><div class="v" style="font-size:16px">${s.disk_used ? fmtBytes(s.disk_used) : '—'}</div></div>
            <div><div class="k">Free</div><div class="v" style="font-size:16px">${s.disk_free ? fmtBytes(s.disk_free) : '—'}</div></div>
            <div><div class="k">Usage</div><div class="v" style="font-size:16px">${s.disk_percent != null ? s.disk_percent.toFixed(1) + '%' : '—'}</div></div>
          </div>
        </div>
        
        <div class="panel glass" style="margin-top:16px">
          <h3>XRAY PROCESS</h3>
          <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr))">
            <div><div class="k">Status</div><div class="v" style="font-size:18px">${s.xray_running ? '🟢 Running' : '🔴 Stopped'}</div></div>
            <div><div class="k">PID</div><div class="v" style="font-size:18px">${s.xray_pid || '—'}</div></div>
            <div><div class="k">Binary</div><div class="v" style="font-size:14px">${esc(s.xray_binary || '—')}</div></div>
            <div><div class="k">Version</div><div class="v" style="font-size:14px">${esc(s.xray_version || '—')}</div></div>
            <div><div class="k">Config</div><div class="v" style="font-size:12px">${esc(s.xray_config || '—')}</div></div>
            <div><div class="k">Uptime</div><div class="v" style="font-size:16px">${s.xray_uptime || '—'}</div></div>
          </div>
          <div class="row-actions" style="margin-top:16px">
            <button class="btn btn-sm" data-act="restart">⟳ Restart Xray</button>
            <button class="btn btn-sm" data-act="reload">⚡ Reload Config</button>
            <button class="btn btn-sm" data-act="validate">✓ Validate Config</button>
          </div>
          <div id="sys-validate-out" class="muted" style="font-size:12px;margin-top:10px;white-space:pre-wrap"></div>
        </div>
      `;
      
      document.getElementById('content').innerHTML = html;
      
      // Bind buttons
      document.querySelector('[data-act="restart"]').onclick = async () => {
        try { await api('/system/restart', { method: 'POST' }); toast('Restarting Xray...'); setTimeout(renderSystem, 3000); }
        catch (e) { toast(e.message, 'err'); }
      };
      document.querySelector('[data-act="reload"]').onclick = async () => {
        try { await api('/system/reload', { method: 'POST' }); toast('Config reloaded'); renderSystem(); }
        catch (e) { toast(e.message, 'err'); }
      };
      document.querySelector('[data-act="validate"]').onclick = async () => {
        const out = document.getElementById('sys-validate-out');
        out.textContent = 'Validating…';
        try {
          const r = await api('/xray/validate', { method: 'POST' });
          out.className = r.ok ? 'ok' : 'error-text';
          out.style.whiteSpace = 'pre-wrap';
          out.textContent = r.ok ? '✓ Config valid: ' + (r.message || '') : '✗ ' + (r.message || '') + '\n' + (r.stderr || '');
        } catch (e) { out.className = 'error-text'; out.textContent = e.message; }
      };
    } catch (e) {
      document.getElementById('content').innerHTML = `<div class="panel glass"><p class="error-text">${e.message}</p></div>`;
    }
  }

  window.initSystem = renderSystem;
</script>
{% endblock %}
