{% extends "base.html" %}
{% block title %}System - Spider Panel{% endblock %}

{% block content %}
<div id="app-view" class="app-shell">
  <!-- Main content area -->
  <main class="main">
    <header class="topbar glass">
      <h2 id="view-title">System</h2>
      <div class="topbar-right">
        <span id="xray-status" class="pill">Xray: …</span>
        <span id="me-name" class="me"></span>
      </div>
    </header>

    <div class="content" id="content">
      <!-- System content loads here -->
    </div>
  </main>
</div>

<!-- Modal -->
<div id="modal" class="modal-backdrop" hidden>
  <div class="modal glass" id="modal-card"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
// System view renderer
async function renderSystem() {
  try {
    const root = document.getElementById('content');
    const s = await api('/system');
    const health = await api('/xray/last-result').catch(() => ({}));
    
    root.innerHTML = `
      <div class="panel glass">
        <h3>SYSTEM INFORMATION</h3>
        <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px">
          <div><div class="k">Hostname</div><div class="v" style="font-size:16px">${esc(s.hostname || '—')}</div></div>
          <div><div class="k">OS</div><div class="v" style="font-size:16px">${esc(s.os || '—')}</div></div>
          <div><div class="k">Architecture</div><div class="v" style="font-size:16px">${esc(s.arch || '—')}</div></div>
          <div><div class="k">Kernel</div><div class="v" style="font-size:16px">${esc(s.kernel || '—')}</div></div>
          <div><div class="k">Uptime</div><div class="v" style="font-size:16px">${esc(s.uptime || '—')}</div></div>
          <div><div class="k">Timezone</div><div class="v" style="font-size:16px">${esc(s.timezone || 'UTC')}</div></div>
        </div>
      </div>
      
      <div class="panel glass" style="margin-top:16px">
        <h3>RESOURCES</h3>
        <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px">
          <div><div class="k">CPU</div><div class="v">${s.cpu_percent ?? '—'}%</div><div class="sub">${s.cpu_cores || '—'} cores</div></div>
          <div><div class="k">RAM</div><div class="v">${s.memory_percent ?? '—'}%</div><div class="sub">${fmtBytes(s.memory_used)} / ${fmtBytes(s.memory_total)}</div></div>
          <div><div class="k">Swap</div><div class="v">${s.swap_percent ?? '—'}%</div><div class="sub">${fmtBytes(s.swap_used)} / ${fmtBytes(s.swap_total)}</div></div>
          <div><div class="k">Disk</div><div class="v">${s.disk_percent ?? '—'}%</div><div class="sub">${fmtBytes(s.disk_used)} / ${fmtBytes(s.disk_total)}</div></div>
        </div>
      </div>
      
      <div class="panel glass" style="margin-top:16px">
        <h3>XRAY PROCESS</h3>
        <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px">
          <div><div class="k">Status</div><div class="v" style="font-size:18px">${health.running ? '<span class="badge active">RUNNING</span>' : '<span class="badge disabled">STOPPED</span>'}</div></div>
          <div><div class="k">PID</div><div class="v" style="font-size:18px">${health.pid || '—'}</div></div>
          <div><div class="k">Version</div><div class="v" style="font-size:14px">${esc(health.version || '—')}</div></div>
          <div><div class="k">Binary</div><div class="v" style="font-size:12px">${esc(health.binary || '—')}</div></div>
          <div><div class="k">Config</div><div class="v" style="font-size:12px">${esc(health.config || '—')}</div></div>
          <div><div class="k">Auto-restart</div><div class="v">${health.auto_restart ? 'Enabled' : 'Disabled'}</div></div>
        </div>
        <div class="row-actions" style="margin-top:16px">
          <button class="btn btn-sm" data-act="restart">⟳ Restart Xray</button>
          <button class="btn btn-sm" data-act="reload">⚡ Reload Config</button>
          <button class="btn btn-sm" data-act="logs" id="sys-logs">📜 View Logs</button>
          <button class="btn btn-sm" data-act="validate">✓ Validate</button>
        </div>
        <div id="sys-validate-out" class="muted" style="font-size:12px;margin-top:10px;white-space:pre-wrap"></div>
      </div>
    `;
    
    // Bind buttons
    root.querySelector('[data-act="restart"]').onclick = async () => {
      try { await api('/system/restart', { method: 'POST' }); toast('Restarting...'); setTimeout(renderSystem, 3000); }
      catch (e) { toast(e.message, 'err'); }
    };
    root.querySelector('[data-act="reload"]').onclick = async () => {
      try { await api('/system/reload', { method: 'POST' }); toast('Config reloaded'); renderSystem(); }
      catch (e) { toast(e.message, 'err'); }
    };
    root.querySelector('[data-act="logs"]').onclick = () => window.location.href = '/xray';
    root.querySelector('[data-act="validate"]').onclick = async () => {
      const out = document.getElementById('sys-validate-out');
      out.textContent = 'Validating…';
      try {
        const r = await api('/xray/validate', { method: 'POST' });
        out.className = r.ok ? 'ok' : 'error-text';
        out.style.whiteSpace = 'pre-wrap';
        out.textContent = r.ok ? '✓ Config valid: ' + (r.message || '') : '✗ ' + (r.message || '') + '\n' + (r.stderr || '');
      } catch (e) { out.className = 'error-text'; out.textContent = e.message; }
    };
    
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="panel glass"><p class="error-text">${e.message}</p></div>`;
  }
}

window.initSystem = renderSystem;
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => renderSystem());
} else {
  renderSystem();
}

</script>
{% endblock %}
