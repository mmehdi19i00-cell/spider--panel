<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#08060a" />
  <title>Spider Panel — Login</title>
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='10' fill='%23ff2d55'/%3E%3C/svg%3E" />
</head>
<body>
  <!-- Telegram contact (top-left) -->
  <a class="tg-contact" href="https://t.me/amirsplder" target="_blank" rel="noopener noreferrer" aria-label="Contact @amirsplder on Telegram">
    <span class="tg-ico" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l10.66-4.12c.73-.33 1.43.18 1.15 1.3l-2.32 10.94c-.21 1.02-.85 1.27-1.73.78l-3.46-2.55-1.57 1.51c-.17.17-.31.31-.62.31z"/></svg>
    </span>
    <span class="tg-text"><span class="tg-title">Contact Me</span><span class="tg-handle">@amirsplder</span></span>
  </a>

  <section class="auth-wrap">
    <div class="auth-card glass">
      <div class="brand">
        <div class="spider-logo">
          <svg viewBox="0 0 100 100" width="64" height="64"><g class="legs" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"><path d="M50 50 L18 22 M50 50 L14 50 M50 50 L18 78 M50 50 L82 22 M50 50 L86 50 M50 50 L82 78"/></g><circle class="body" cx="50" cy="50" r="14" fill="currentColor"/><circle cx="45" cy="46" r="2.4" fill="#08060a"/><circle cx="55" cy="46" r="2.4" fill="#08060a"/></svg>
        </div>
        <h1 class="title-neon">SPIDER PANEL</h1>
        <p class="subtitle">Xray Core Management</p>
      </div>
      <form id="login-form" class="auth-form" autocomplete="on">
        <label class="lbl">Username<input id="login-username" type="text" autocomplete="username" required /></label>
        <div class="field password-wrap">
          <label class="lbl">Password<input id="login-password" type="password" autocomplete="current-password" required /></label>
          <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Show password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <label class="remember"><input type="checkbox" id="remember" checked /> Remember me</label>
        <button type="submit" class="btn btn-primary neon btn-block">ENTER</button>
        <p id="login-error" class="error-text" hidden></p>
      </form>
    </div>
  </section>

  <script src="/assets/js/icons.js"></script>
  <script src="/assets/js/app.js"></script>
  <script>window.bootPage("login");</script>
</body>
</html>
