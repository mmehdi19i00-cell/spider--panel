{% extends "base.html" %}
{% block title %}Domains - Spider Panel{% endblock %}

{% block content %}
<div id="app-view" class="app-shell">
  <!-- Main content area -->
  <main class="main">
    <header class="topbar glass">
      <h2 id="view-title">Domains</h2>
      <div class="topbar-right">
        <span id="xray-status" class="pill">Xray: …</span>
        <span id="me-name" class="me"></span>
      </div>
    </header>

    <div class="content" id="content">
      <!-- Domains content loads here -->
    </div>
  </main>

  <!-- Floating Action Button -->
  <button class="fab" id="fab-add-dom" aria-label="Add Domain" title="Add Domain">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
</div>

<!-- Modal -->
<div id="modal" class="modal-backdrop" hidden>
  <div class="modal glass" id="modal-card"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
// Domains view renderer
async function renderDomains() {
  try {
    const list = await api('/domains');
    const root = document.getElementById('content');
    
    const rows = list.map((d) => `
      <tr>
        <td data-label="Domain">${esc(d.domain)}</td>
        <td data-label="Status">${d.is_active ? '<span class="badge active">ACTIVE</span>' : '—'}</td>
        <td data-label="Note">${esc(d.note || '')}</td>
        <td data-label="Actions"><div class="row-actions">
          ${d.is_active ? '' : `<button class="btn btn-sm btn-ok" data-act="act" data-d="${esc(d.domain)}">Activate</button>`}
          <button class="btn btn-sm btn-ghost danger" data-act="del" data-d="${esc(d.domain)}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
        </div></td>
      </tr>
    `).join('');
    
    root.innerHTML = `
      <div class="panel glass">
        <div class="panel-head"><h3>DOMAINS</h3><span class="spacer"></span></div>
        <p class="muted" style="font-size:12px">The active domain is used for Reality SNI, TLS, and subscription links.</p>
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
          <input id="dom-in" class="field" style="flex:1;min-width:200px;margin:0" placeholder="example.com">
          <button class="btn btn-primary neon btn-sm" id="add-dom">+ Add</button>
        </div>
        <table class="table"><thead><tr><th>Domain</th><th>Status</th><th>Note</th><th>Actions</th></tr></thead>
        <tbody>${rows || `<tr><td colspan="4" class="muted">No domains</td></tr>`}</tbody></table>
      </div>
    `;
    
    root.querySelector('#add-dom').onclick = async () => {
      const dom = root.querySelector('#dom-in').value.trim();
      if (!dom) return;
      try { await api('/domains', { method: 'POST', body: { domain: dom } }); toast('Added'); renderDomains(); }
      catch (e) { toast(e.message, 'err'); }
    };
    
    root.querySelectorAll('[data-act]').forEach(b => {
      b.onclick = async () => {
        const d = b.dataset.d;
        try {
          if (b.dataset.act === 'act') {
            await api(`/domains/${encodeURIComponent(d)}/activate`, { method: 'POST' });
            toast('Activated + config reloaded');
            renderDomains();
          } else if (b.dataset.act === 'del') {
            if (confirm(`Delete ${d}?`)) {
              await api(`/domains/${encodeURIComponent(d)}`, { method: 'DELETE' });
              toast('Deleted');
              renderDomains();
            }
          }
        } catch (e) { toast(e.message, 'err'); }
      };
    });
    
    // FAB button
    document.getElementById('fab-add-dom').onclick = () => {
      root.querySelector('#dom-in').focus();
    };
    
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="panel glass"><p class="error-text">${e.message}</p></div>`;
  }
}

window.initDomains = renderDomains;
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => renderDomains());
} else {
  renderDomains();
}

</script>
{% endblock %}
