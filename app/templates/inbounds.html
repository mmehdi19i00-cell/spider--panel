      <a class="nav-item" data-view="logs"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M4 13h16"/><path d="M4 19h16"/></svg></span> Xray Logs</a>
      <a class="nav-item" data-view="settings"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span> Settings</a>

    <div class="side-foot">
      <button id="theme-toggle" class="btn btn-ghost" title="Toggle theme"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg> Theme</button>
      <button id="logout-btn" class="btn btn-ghost danger"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="topbar glass">
      <button id="menu-btn" class="btn btn-ghost only-mobile" aria-label="Menu"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <h2 id="view-title">Inbounds</h2>
      <div class="topbar-right">
        <span id="xray-status" class="pill">Xray: …</span>
        <span id="me-name" class="me"></span>
      </div>
    </header>

    <div class="content" id="content">
      <!-- Inbounds content loads here -->
    </div>
  </main>
</div>

<!-- Modal -->
<div id="modal" class="modal-backdrop" hidden>
  <div class="modal glass" id="modal-card"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  // Inbounds view renderer
  async function renderInbounds() {
    try {
      const list = await api('/inbounds');
      const rows = list.map(ib => `
        <tr>
          <td data-label="Tag">${esc(ib.tag)}</td>
          <td data-label="Type">${ib.security} / ${ib.network}</td>
          <td data-label="Domain">${esc(ib.domain || '—')}</td>
          <td data-label="Port">${ib.port}${ib.external_port && ib.external_port !== ib.port ? ` <span class="badge">ext:${ib.external_port}</span>` : ''}</td>
          <td data-label="Reality">${ib.security === 'reality' ? `pbk:${esc(ib.public_key.slice(0, 10))}…` : '—'}</td>
          <td data-label="Status"><span class="badge ${ib.enabled ? 'active' : 'disabled'}">${ib.enabled ? 'on' : 'off'}</span></td>
          <td data-label="Actions"><div class="row-actions">
            <button class="btn btn-sm btn-min" data-act="edit" data-id="${ib.id}" title="Edit"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
            <button class="btn btn-sm btn-min" data-act="keys" data-id="${ib.id}" title="Regenerate Reality Keys"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2" ry="2"/><path d="M12 22V12"/><path d="M8 16l4-4 4 4"/></svg></button>
            <button class="btn btn-sm btn-min btn-ghost danger" data-act="del" data-id="${ib.id}" title="Delete"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
          </div></td>
        </tr>
      `).join('');
      
      const html = `
        <div class="panel glass">
          <div class="panel-head"><h3>INBOUNDS</h3><span class="spacer"></span>
            <button class="btn btn-primary neon btn-sm" id="add-ib">+ New Inbound</button></div>
          <table class="table"><thead><tr><th>Tag</th><th>Type</th><th>Domain</th><th>Port</th><th>Reality</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>${rows || '<tr><td colspan="7" class="muted">No inbounds</td></tr>'}</tbody></table>
        </div>
      `;
      
      document.getElementById('content').innerHTML = html;
      
      // Bind buttons
      document.getElementById('add-ib').onclick = () => inboundForm(null);
      document.querySelectorAll('[data-act]').forEach(b => {
        b.onclick = async () => {
          const id = b.dataset.id;
          try {
            if (b.dataset.act === 'edit') inboundForm(Number(id));
            else if (b.dataset.act === 'keys') { 
              await api(`/inbounds/${id}/regen-keys`, { method: 'POST' }); 
              toast('Reality keys regenerated'); 
              renderInbounds(); 
            }
            else if (b.dataset.act === 'del') { 
              if (confirm('Delete inbound?')) { 
                await api(`/inbounds/${id}`, { method: 'DELETE' }); 
                toast('Deleted'); 
                renderInbounds(); 
              } 
            }
          } catch (e) { toast(e.message, 'err'); }
        };
      });
    } catch (e) {
      document.getElementById('content').innerHTML = `<div class="panel glass"><p class="error-text">${e.message}</p></div>`;
    }
  }

  function inboundForm(id) {
    const isEdit = id != null;
    openModal(`<h3>${isEdit ? 'EDIT INBOUND' : 'NEW INBOUND'}</h3>
      <form id="ib-f">
        <div class="field-row">
          <div class="field"><label>Tag</label><input name="tag" required ${isEdit ? 'disabled' : ''}></div>
          <div class="field"><label>Name</label><input name="name"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Domain (per-inbound; blank=active)</label><input name="domain" placeholder="vpn.example.com"></div>
          <div class="field"><label>External port (client)</label><input name="external_port" type="number" min="1" max="65535" placeholder="Railway TCP port"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Internal port (bind)</label><input name="port" type="number" min="1" max="65535" value="8443"></div>
          <div class="field"><label>Security</label><select name="security"><option value="reality">reality</option><option value="tls">tls</option><option value="none">none</option></select></div>
          <div class="field"><label>Network</label><select name="network"><option value="xhttp">xhttp</option><option value="ws">ws</option><option value="tcp">tcp</option></select></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Server name (Reality dest)</label><input name="server_name" placeholder="target.com:443"></div>
          <div class="field"><label>SpiderX</label><input name="spider_x" value="/"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Path</label><input name="transport_path" value="/"></div>
          <div class="field"><label>WS Host (ws only)</label><input name="ws_host" placeholder="optional"></div>
        </div>
        <div class="field"><label>Enabled (1/0)</label><input name="enabled" value="1"></div>
        <div class="modal-actions"><button type="button" class="btn btn-ghost modal-close">Cancel</button>
          <button class="btn btn-primary neon">Save</button></div>
      </form>`);
    document.getElementById('ib-f').onsubmit = async (e) => {
      e.preventDefault();
      const f = Object.fromEntries(new FormData(e.target).entries());
      const payload = {
        name: f.name, port: Number(f.port), security: f.security, network: f.network,
        server_name: f.server_name, spider_x: f.spider_x, transport_path: f.transport_path,
        domain: f.domain || '', ws_host: f.ws_host, xhttp_mode: f.xhttp_mode,
        external_port: f.external_port ? Number(f.external_port) : null,
        enabled: f.enabled === '1',
      };
      if (!isEdit) payload.tag = f.tag;
      try {
        if (isEdit) await api(`/inbounds/${id}`, { method: 'PUT', body: payload });
        else await api('/inbounds', { method: 'POST', body: payload });
        closeModal(); toast('Saved'); renderInbounds();
      } catch (e) { toast(e.message, 'err'); }
    };
  }

  window.initInbounds = renderInbounds;
</script>
{% endblock %}
