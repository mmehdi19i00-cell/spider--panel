{% extends "base.html" %}
{% block title %}Inbounds - Spider Panel{% endblock %}

{% block content %}
<div id="app-view" class="app-shell">
  <!-- Main content area -->
  <main class="main">
    <header class="topbar glass">
      <h2 id="view-title">Inbounds</h2>
      <div class="topbar-right">
        <span id="xray-status" class="pill">Xray: …</span>
        <span id="me-name" class="me"></span>
      </div>
    </header>

    <div class="content" id="content">
      <!-- Inbounds content loads here -->
    </div>
  </main>

  <!-- Floating Action Button -->
  <button class="fab" id="fab-add-ib" aria-label="Add Inbound" title="Add Inbound">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
</div>

<!-- Modal -->
<div id="modal" class="modal-backdrop" hidden>
  <div class="modal glass" id="modal-card"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
// Inbounds view renderer
async function renderInbounds() {
  try {
    const list = await api('/inbounds');
    const root = document.getElementById('content');
    
    const rows = list.map((ib) => `
      <tr>
        <td data-label="Tag">${esc(ib.tag)}</td>
        <td data-label="Type">${ib.security} / ${ib.network}</td>
        <td data-label="Domain">${esc(ib.domain || '—')}</td>
        <td data-label="Port">${ib.port}${ib.external_port && ib.external_port !== ib.port ? ` <span class="badge">ext:${ib.external_port}</span>` : ''}</td>
        <td data-label="Reality">${ib.security === 'reality' ? `pbk:${esc(ib.public_key.slice(0, 10))}…` : '—'}</td>
        <td data-label="Status"><span class="badge ${ib.enabled ? 'active' : 'disabled'}">${ib.enabled ? 'on' : 'off'}</span></td>
        <td data-label="Actions"><div class="row-actions">
          <button class="btn btn-sm btn-min" data-act="edit" data-id="${ib.id}" title="Edit"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
          <button class="btn btn-sm btn-min" data-act="keys" data-id="${ib.id}" title="Regenerate Reality Keys"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M6 12h12"/></svg></button>
          <button class="btn btn-sm btn-min danger" data-act="del" data-id="${ib.id}" title="Delete"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
        </div></td>
      </tr>
    `).join('');
    
    root.innerHTML = `
      <div class="panel glass">
        <div class="panel-head"><h3>INBOUNDS</h3><span class="spacer"></span></div>
        <table class="table"><thead><tr><th>Tag</th><th>Type</th><th>Domain</th><th>Port</th><th>Reality</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>${rows || `<tr><td colspan="7" class="muted">No inbounds</td></tr>`}</tbody></table>
      </div>
    `;
    
    // Bind actions
    root.querySelectorAll('[data-act="edit"]').forEach(b => {
      b.onclick = () => inboundForm(Number(b.dataset.id));
    });
    root.querySelectorAll('[data-act="keys"]').forEach(b => {
      b.onclick = async () => {
        try {
          await api(`/inbounds/${b.dataset.id}/regen-keys`, { method: 'POST' });
          toast('Reality keys regenerated');
          renderInbounds();
        } catch (e) { toast(e.message, 'err'); }
      };
    });
    root.querySelectorAll('[data-act="del"]').forEach(b => {
      b.onclick = async () => {
        if (!confirm('Delete inbound?')) return;
        try {
          await api(`/inbounds/${b.dataset.id}`, { method: 'DELETE' });
          toast('Deleted');
          renderInbounds();
        } catch (e) { toast(e.message, 'err'); }
      };
    });
    
    // FAB button
    document.getElementById('fab-add-ib').onclick = () => inboundForm(null);
    
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="panel glass"><p class="error-text">${e.message}</p></div>`;
  }
}

function inboundForm(id) {
  const isEdit = id != null;
  openModal(`
    <h3>${isEdit ? 'EDIT INBOUND' : 'NEW INBOUND'}</h3>
    <form id="ib-f">
      <div class="field-row">
        <div class="field"><label>Tag<input name="tag" required ${isEdit ? 'disabled' : ''}></label></div>
        <div class="field"><label>Name<input name="name"></label></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Domain (per-inbound; blank=active)<input name="domain" placeholder="vpn.example.com"></label></div>
        <div class="field"><label>External port (client)<input name="external_port" type="number" min="1" max="65535" placeholder="Railway TCP port"></label></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Internal port (bind)<input name="port" type="number" min="1" max="65535" value="8443"></label></div>
        <div class="field"><label>Security<select name="security"><option value="reality">reality</option><option value="tls">tls</option><option value="none">none</option></select></label></div>
        <div class="field"><label>Network<select name="network"><option value="xhttp">xhttp</option><option value="ws">ws</option><option value="tcp">tcp</option></select></label></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Server name (Reality dest)<input name="server_name" placeholder="target.com:443"></label></div>
        <div class="field"><label>SpiderX<input name="spider_x" value="/"></label></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Path<input name="transport_path" value="/"></label></div>
        <div class="field"><label>WS Host (ws only)<input name="ws_host" placeholder="optional"></label></div>
      </div>
      <div class="field"><label>Enabled<input name="enabled" value="1"></label></div>
      <div class="modal-actions"><button type="button" class="btn btn-ghost modal-close">Cancel</button>
        <button class="btn btn-primary neon">Save</button></div>
    </form>
  `);
  
  const form = document.getElementById('ib-f');
  if (isEdit) {
    api(`/inbounds/${id}`).then(ib => {
      Object.keys(ib).forEach(k => {
        const el = form.querySelector(`[name="${k}"]`);
        if (el) {
          if (el.type === 'checkbox') el.checked = ib[k];
          else if (el.type === 'select-one') el.value = ib[k];
          else el.value = ib[k] ?? '';
        }
      });
    }).catch(e => toast(e.message, 'err'));
  }
  
  document.querySelector('.modal-close').onclick = () => closeModal();
  form.onsubmit = async (e) => {
    e.preventDefault();
    const f = Object.fromEntries(new FormData(form).entries());
    const payload = {
      name: f.name, port: Number(f.port), security: f.security, network: f.network,
      server_name: f.server_name, spider_x: f.spider_x, transport_path: f.transport_path,
      domain: f.domain || '', ws_host: f.ws_host, xhttp_mode: f.xhttp_mode,
      external_port: f.external_port ? Number(f.external_port) : null,
      enabled: f.enabled === '1',
    };
    if (!isEdit) payload.tag = f.tag;
    try {
      if (isEdit) await api(`/inbounds/${id}`, { method: 'PUT', body: payload });
      else await api('/inbounds', { method: 'POST', body: payload });
      closeModal(); toast('Saved'); renderInbounds();
    } catch (e) { toast(e.message, 'err'); }
  };
}

window.initInbounds = renderInbounds;
</script>
{% endblock %}
