{% extends "base.html" %}
{% block title %}Console - Spider Panel{% endblock %}

{% block content %}
{# ===== Console SPA shell ===== #}
<div class="console" id="console">

  <!-- Fixed left sidebar -->
  <aside class="sidebar-fixed" id="sidebar" aria-label="Primary">
    <div class="side-brand">
      <div class="side-logo" aria-hidden="true">
        <svg viewBox="0 0 100 100" width="34" height="34">
          <g class="legs" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round">
            <path d="M50 50 L18 22 M50 50 L14 50 M50 50 L18 78 M50 50 L82 22 M50 50 L86 50 M50 50 L82 78"/>
          </g>
          <circle class="body" cx="50" cy="50" r="13" fill="currentColor"/>
        </svg>
      </div>
      <div class="side-id">
        <div class="side-name">SPIDER PANEL</div>
        <div class="side-user" id="side-user">{{ user }}</div>
        <div class="side-conn"><span class="dot-live" id="conn-dot"></span><span id="conn-text">Connecting…</span></div>
      </div>
      <button class="side-collapse" id="side-collapse" title="Collapse sidebar ( [ )" aria-label="Collapse sidebar">«</button>
    </div>

    <nav class="side-nav" id="side-nav">
      <!-- nav items injected by app_shell.js -->
    </nav>

    <div class="side-foot">
      <button class="btn btn-sm btn-ghost danger" id="side-logout">⎋ Logout</button>
    </div>
  </aside>

  <!-- Main column -->
  <div class="main-col">
    <header class="topbar-fixed">
      <button class="icon-btn only-mobile" id="menu-btn" aria-label="Open menu">☰</button>
      <h2 id="view-title">Dashboard</h2>
      <div class="topbar-right">
        <span class="pill" id="xray-pill">Xray: …</span>
        <button class="icon-btn" id="theme-btn" title="Toggle theme" aria-label="Toggle theme">◐</button>
      </div>
    </header>

    <main class="console-content" id="content" tabindex="-1">
      <div class="skeleton-wrap" id="skeleton"><div class="skeleton-bar"></div><div class="skeleton-bar short"></div><div class="skeleton-card"></div></div>
    </main>
  </div>

  <!-- Mobile sidebar scrim -->
  <div class="scrim" id="scrim" hidden></div>
</div>
{% endblock %}

{% block extra_styles %}
<style>
  /* ---- Console layout: fixed sidebar + fluid main ---- */
  .console { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }
  .sidebar-fixed {
    position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column;
    background: linear-gradient(180deg, rgba(20,2,12,.78), rgba(10,0,8,.78));
    border-right: 1px solid var(--glass-brd);
    backdrop-filter: blur(16px) saturate(140%); -webkit-backdrop-filter: blur(16px) saturate(140%);
    transition: width .26s cubic-bezier(.4,0,.2,1), transform .26s cubic-bezier(.4,0,.2,1);
    overflow: hidden; z-index: 50;
  }
  .console.collapsed .sidebar-fixed { width: 76px; }
  .console.collapsed .side-id, .console.collapsed .side-foot .btn span,
  .console.collapsed .nav-label, .console.collapsed .side-conn span:last-child { display: none; }
  .console.collapsed .side-name { font-size: 0; }
  .console.collapsed .side-logo { margin: 0 auto; }

  .side-brand { display: flex; align-items: center; gap: 10px; padding: 16px 14px; border-bottom: 1px solid rgba(255,26,60,.12); position: relative; }
  .side-logo { color: var(--neon); filter: drop-shadow(0 0 8px var(--neon)); flex: 0 0 auto; }
  .side-logo .legs { animation: spin 14s linear infinite; transform-origin: 50% 50%; }
  .side-name { font-weight: 800; letter-spacing: 3px; font-size: 14px; color: var(--txt);
    text-shadow: 0 0 10px rgba(255,26,60,.5); white-space: nowrap; }
  .side-user { font-size: 12px; color: var(--txt-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .side-conn { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--txt-dim); margin-top: 2px; }
  .dot-live { width: 8px; height: 8px; border-radius: 50%; background: var(--bad); box-shadow: 0 0 8px var(--bad); }
  .dot-live.on { background: var(--ok); box-shadow: 0 0 8px var(--ok); animation: pulseGlow 2s infinite alternate; }
  .side-collapse { position: absolute; right: 8px; top: 14px; background: transparent; border: 1px solid var(--glass-brd);
    color: var(--txt-dim); width: 22px; height: 22px; border-radius: 6px; cursor: pointer; line-height: 1; }
  .console.collapsed .side-collapse { right: 50%; transform: translateX(50%); }

  .side-nav { flex: 1; overflow-y: auto; padding: 10px 8px; display: flex; flex-direction: column; gap: 4px; }
  .nav-item {
    display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: 12px;
    color: var(--txt-dim); cursor: pointer; border: 1px solid transparent; position: relative;
    transition: background .18s, color .18s, transform .12s, box-shadow .18s; background: transparent;
    font-weight: 600; font-size: 13.5px; letter-spacing: .4px; width: 100%; text-align: left;
  }
  .nav-item svg { width: 20px; height: 20px; flex: 0 0 auto; }
  .nav-item:hover { color: var(--txt); background: rgba(255,26,60,.08); box-shadow: 0 0 14px rgba(255,26,60,.18); transform: translateX(2px); }
  .nav-item.active { color: #fff; background: linear-gradient(135deg, rgba(255,26,60,.22), rgba(179,0,27,.18));
    border-color: var(--glass-brd); box-shadow: var(--shadow-neon); }
  .nav-item.active::before { content: ""; position: absolute; left: -8px; top: 18%; bottom: 18%; width: 3px; border-radius: 3px; background: var(--neon); box-shadow: 0 0 10px var(--neon); }
  .nav-label { white-space: nowrap; }
  .nav-badge { margin-left: auto; font-size: 10px; padding: 2px 7px; border-radius: 20px; background: var(--neon); color: #fff; box-shadow: 0 0 10px var(--neon); }
  .nav-kbd { margin-left: auto; font-size: 10px; color: var(--txt-dim); border: 1px solid var(--glass-brd); border-radius: 5px; padding: 1px 5px; font-family: ui-monospace, monospace; }
  .console.collapsed .nav-badge, .console.collapsed .nav-kbd { display: none; }
  .nav-item .tip { position: absolute; left: calc(100% + 10px); top: 50%; transform: translateY(-50%) scale(.96);
    background: #1a0410; border: 1px solid var(--glass-brd); color: var(--txt); padding: 6px 10px; border-radius: 8px;
    white-space: nowrap; opacity: 0; pointer-events: none; transition: .15s; z-index: 60; box-shadow: var(--shadow-neon); }
  .console.collapsed .nav-item:hover .tip { opacity: 1; transform: translateY(-50%) scale(1); }

  .side-foot { padding: 12px; border-top: 1px solid rgba(255,26,60,.12); }
  .side-foot .btn { width: 100%; }

  .main-col { display: flex; flex-direction: column; min-width: 0; }
  .topbar-fixed { position: sticky; top: 0; z-index: 40; display: flex; align-items: center; gap: 12px;
    padding: 12px 18px; margin: 12px 12px 0; background: var(--glass); border: 1px solid var(--glass-brd);
    border-radius: 14px; backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
  .topbar-fixed h2 { margin: 0; font-size: 18px; letter-spacing: 2px; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .icon-btn { background: transparent; border: 1px solid var(--glass-brd); color: var(--txt); width: 38px; height: 38px;
    border-radius: 10px; cursor: pointer; transition: .18s; }
  .icon-btn:hover { color: #fff; box-shadow: var(--shadow-neon); border-color: var(--neon); }
  .console-content { padding: 18px 14px 100px; min-height: 60vh; }

  .scrim { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 45; }

  /* Skeleton loading */
  .skeleton-wrap { display: flex; flex-direction: column; gap: 14px; max-width: 900px; }
  .skeleton-bar { height: 22px; border-radius: 8px; background: linear-gradient(90deg, rgba(255,26,60,.08), rgba(255,26,60,.2), rgba(255,26,60,.08)); background-size: 200% 100%; animation: sk 1.2s infinite; }
  .skeleton-bar.short { width: 40%; }
  .skeleton-card { height: 180px; border-radius: 16px; background: linear-gradient(90deg, rgba(255,26,60,.06), rgba(255,26,60,.16), rgba(255,26,60,.06)); background-size: 200% 100%; animation: sk 1.2s infinite; }
  @keyframes sk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* Section fade/slide */
  .view-enter { animation: viewIn .28s cubic-bezier(.2,.7,.2,1); }
  @keyframes viewIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  /* Browser page */
  .browser-chrome { display: flex; align-items: center; gap: 8px; padding: 8px; background: var(--glass); border: 1px solid var(--glass-brd); border-radius: 12px 12px 0 0; flex-wrap: wrap; }
  .browser-chrome .icon-btn { width: 34px; height: 34px; }
  .addr { flex: 1; min-width: 200px; display: flex; gap: 8px; }
  .addr input { flex: 1; }
  .browser-frame-wrap { position: relative; border: 1px solid var(--glass-brd); border-top: none; border-radius: 0 0 12px 12px; overflow: hidden; background: #fff; height: 62vh; min-height: 380px; }
  .browser-frame { width: 100%; height: 100%; border: 0; display: block; }
  .browser-loading { position: absolute; left: 0; right: 0; top: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--neon), transparent); background-size: 40% 100%; background-repeat: no-repeat; animation: load 1s infinite; display: none; }
  .browser-loading.on { display: block; }
  @keyframes load { 0% { background-position: -40% 0; } 100% { background-position: 140% 0; } }
  .tabs { display: flex; gap: 6px; padding: 8px 8px 0; flex-wrap: wrap; }
  .tab { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 10px 10px 0 0; background: rgba(255,26,60,.06); border: 1px solid var(--glass-brd); border-bottom: none; cursor: pointer; color: var(--txt-dim); max-width: 220px; }
  .tab.active { color: #fff; background: rgba(255,26,60,.16); }
  .tab .t-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px; }
  .tab .t-close { font-size: 12px; opacity: .7; }
  .tab .t-close:hover { opacity: 1; color: var(--bad); }
  .zoom { display: flex; align-items: center; gap: 4px; }

  /* Floating control panels */
  .float-panel { position: fixed; z-index: 70; width: 260px; background: var(--glass); border: 1px solid var(--glass-brd); border-radius: 14px; box-shadow: var(--shadow-neon); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
  .float-panel .fp-head { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-bottom: 1px solid rgba(255,26,60,.14); cursor: move; }
  .float-panel .fp-head h4 { margin: 0; font-size: 13px; letter-spacing: 1px; flex: 1; }
  .float-panel .fp-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .fp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .touchpad { width: 100%; height: 130px; border-radius: 12px; background: radial-gradient(circle at 50% 50%, rgba(255,26,60,.12), rgba(10,0,8,.6)); border: 1px solid var(--glass-brd); touch-action: none; cursor: crosshair; position: relative; overflow: hidden; }
  .touchpad .cur { position: absolute; width: 12px; height: 12px; border-radius: 50%; background: var(--neon); box-shadow: 0 0 10px var(--neon); transform: translate(-50%,-50%); pointer-events: none; }
  .clip-box { width: 100%; min-height: 120px; resize: vertical; }
  .fp-min { font-size: 16px; line-height: 1; }

  @media (max-width: 820px) {
    .console { grid-template-columns: 1fr; }
    .sidebar-fixed { position: fixed; left: 0; top: 0; bottom: 0; width: 248px; transform: translateX(-110%); }
    .console.nav-open .sidebar-fixed { transform: none; }
    .console.collapsed .sidebar-fixed { width: 248px; }
    .console.collapsed .side-id, .console.collapsed .nav-label { display: revert; }
    .float-panel { width: 92vw; right: 4vw !important; left: 4vw !important; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
  }
</style>
{% endblock %}

{% block extra_scripts %}
<script src="/assets/js/app_shell.js" defer></script>
{% endblock %}
