{% extends "base.html" %}
{% block title %}Settings - Spider Panel{% endblock %}

{% block content %}
<div id="app-view" class="app-shell">
  <!-- Main content area -->
  <main class="main">
    <header class="topbar glass">
      <h2 id="view-title">Settings</h2>
      <div class="topbar-right">
        <span id="xray-status" class="pill">Xray: …</span>
        <span id="me-name" class="me"></span>
      </div>
    </header>

    <div class="content" id="content">
      <!-- Settings content loads here -->
    </div>
  </main>
</div>

<!-- Modal -->
<div id="modal" class="modal-backdrop" hidden>
  <div class="modal glass" id="modal-card"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
// Settings view renderer
async function renderSettings() {
  try {
    const root = document.getElementById('content');
    const s = await api('/settings');
    
    root.innerHTML = `
      <div class="panel glass">
        <h3>PANEL SETTINGS</h3>
        <div class="setting-row">
          <div>
            <div class="k">Admin Username</div>
            <div class="sub">${esc(s.admin_username || 'admin')}</div>
          </div>
        </div>
        <div class="setting-row">
          <div>
            <div class="k">Admin Email</div>
            <div class="sub">${esc(s.admin_email || '(none)')}</div>
          </div>
        </div>
        <div class="setting-row">
          <div>
            <div class="k">Xray Internal Port</div>
            <div class="sub">${s.xray_inbound_port || 24567}</div>
          </div>
        </div>
        <div class="setting-row">
          <div>
            <div class="k">Railway TCP Proxy Port</div>
            <div class="sub">${s.railway_tcp_proxy_port || '(not set)'}</div>
          </div>
        </div>
        <div class="setting-row">
          <div>
            <div class="k">Public Host</div>
            <div class="sub">${s.public_host || '(auto)'}</div>
          </div>
        </div>
        <div class="setting-row">
          <div>
            <div class="k">Public Port</div>
            <div class="sub">${s.public_port || '(auto)'}</div>
          </div>
        </div>
        <div class="setting-row">
          <div>
            <div class="k">Data Directory</div>
            <div class="sub">${s.data_dir || '/app/data'}</div>
          </div>
        </div>
        <div class="setting-row">
          <div>
            <div class="k">Log Level</div>
            <div class="sub">${s.log_level || 'INFO'}</div>
          </div>
        </div>
      </div>
      
      <div class="panel glass" style="margin-top:16px">
        <h3>CHANGE CREDENTIALS</h3>
        <form id="cred-form" style="display:flex;flex-direction:column;gap:12px">
          <div class="field"><label>Current Password<input type="password" name="current_password" required></label></div>
          <div class="field"><label>New Username (optional)<input type="text" name="new_username" placeholder="leave blank to keep"></label></div>
          <div class="field"><label>New Password (optional)<input type="password" name="new_password" placeholder="min 6 chars"></label></div>
          <button type="submit" class="btn btn-primary neon">Update</button>
        </form>
      </div>
      
      <div class="panel glass" style="margin-top:16px">
        <h3>XRAY CONFIG</h3>
        <div class="row-actions" style="margin-bottom:12px">
          <button class="btn btn-sm" id="validate-btn">✓ Validate Config</button>
          <button class="btn btn-sm" id="reload-btn">⚡ Reload Config</button>
          <button class="btn btn-sm" id="restart-btn">⟳ Restart Xray</button>
        </div>
        <div id="validate-out" class="muted" style="font-size:12px;white-space:pre-wrap"></div>
      </div>
    `;
    
    // Bind buttons
    document.getElementById('cred-form').onsubmit = async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const body = {
        current_password: fd.get('current_password'),
        new_username: fd.get('new_username') || undefined,
        new_password: fd.get('new_password') || undefined,
      };
      try {
        await api('/auth/change-credentials', { method: 'POST', body });
        toast('Credentials updated');
        e.target.reset();
      } catch (e) { toast(e.message, 'err'); }
    };
    
    document.getElementById('validate-btn').onclick = async () => {
      const out = document.getElementById('validate-out');
      out.textContent = 'Validating…';
      try {
        const r = await api('/xray/validate', { method: 'POST' });
        out.className = r.ok ? 'ok' : 'error-text';
        out.style.whiteSpace = 'pre-wrap';
        out.textContent = r.ok ? '✓ Config valid: ' + (r.message || '') : '✗ ' + (r.message || '') + '\n' + (r.stderr || '');
      } catch (e) { out.className = 'error-text'; out.textContent = e.message; }
    };
    
    document.getElementById('reload-btn').onclick = async () => {
      try { await api('/system/reload', { method: 'POST' }); toast('Config reloaded'); }
      catch (e) { toast(e.message, 'err'); }
    };
    
    document.getElementById('restart-btn').onclick = async () => {
      try { await api('/system/restart', { method: 'POST' }); toast('Restarting...'); setTimeout(renderSettings, 3000); }
      catch (e) { toast(e.message, 'err'); }
    };
    
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="panel glass"><p class="error-text">${e.message}</p></div>`;
  }
}

window.initSettings = renderSettings;
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => renderSettings());
} else {
  renderSettings();
}

</script>
{% endblock %}
