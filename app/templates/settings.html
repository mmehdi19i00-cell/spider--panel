{% extends "base.html" %}
{% block title %}Settings - Spider Panel{% endblock %}

{% block content %}
<div id="app-view" class="app-shell">
  <!-- Sidebar -->
  <aside class="sidebar glass" id="sidebar">
    <div class="side-brand">
      <span class="spider-mini" aria-hidden="true">

          <circle cx="16" cy="16" r="4" fill="currentColor"/>
        </svg>
      </span> SPIDER
    </div>
    <nav class="nav">
      <a class="nav-item" data-view="dashboard"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span> Dashboard</a>
      <a class="nav-item" data-view="users"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> Users</a>
      <a class="nav-item" data-view="inbounds"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span> Inbounds</a>
      <a class="nav-item" data-view="domains"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></span> Domains</a>
      <a class="nav-item" data-view="system"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span> System</a>
      <a class="nav-item" data-view="logs"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M4 13h16"/><path d="M4 19h16"/></svg></span> Xray Logs</a>
      <a class="nav-item active" data-view="settings"><span class="ico" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span> Settings</a>
    </nav>
    <div class="side-foot">
      <button id="theme-toggle" class="btn btn-ghost" title="Toggle theme"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg> Theme</button>
      <button id="logout-btn" class="btn btn-ghost danger"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="topbar glass">
      <button id="menu-btn" class="btn btn-ghost only-mobile" aria-label="Menu"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <h2 id="view-title">Settings</h2>
      <div class="topbar-right">
        <span id="xray-status" class="pill">Xray: …</span>
        <span id="me-name" class="me"></span>
      </div>
    </header>

    <div class="content" id="content">
      <!-- Settings content loads here -->
    </div>
  </main>
</div>

<!-- Modal -->
<div id="modal" class="modal-backdrop" hidden>
  <div class="modal glass" id="modal-card"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  // Settings view renderer
  async function renderSettings() {
    try {
      const s = await api('/settings');
      
      const html = `
        <div class="panel glass">
          <h3>PANEL SETTINGS</h3>
          <div class="setting-row">
            <div class="k">Auto-restart Xray on crash</div>
            <label class="switch"><input type="checkbox" id="set-autorst" ${s.auto_restart ? 'checked' : ''}><span class="slider"></span></label>
          </div>
          <div class="setting-row">
            <div class="k">Panel title</div>
            <div><input class="field" id="set-title" value="${esc(s.panel_title || 'Spider Panel')}" style="max-width:300px"></div>
          </div>
          <div class="setting-row">
            <div class="k">Log level</div>
            <div>
              <select class="field" id="set-loglevel" style="max-width:200px">
                <option value="DEBUG" ${s.log_level === 'DEBUG' ? 'selected' : ''}>DEBUG</option>
                <option value="INFO" ${s.log_level === 'INFO' ? 'selected' : ''}>INFO</option>
                <option value="WARNING" ${s.log_level === 'WARNING' ? 'selected' : ''}>WARNING</option>
                <option value="ERROR" ${s.log_level === 'ERROR' ? 'selected' : ''}>ERROR</option>
              </select>
            </div>
          </div>
          <div class="setting-row">
            <div class="k">Session timeout (minutes)</div>
            <div><input class="field" id="set-session-timeout" type="number" value="${s.session_timeout_minutes || 1440}" style="max-width:100px"></div>
          </div>
        </div>
        
        <div class="panel glass" style="margin-top:16px">
          <h3>CHANGE CREDENTIALS</h3>
          <form id="cred-form" class="auth-form" style="max-width:400px">
            <label>Current Password<input type="password" name="current_password" required></label>
            <label>New Username<input type="text" name="new_username" placeholder="Leave empty to keep current"></label>
            <label>New Password<input type="password" name="new_password" placeholder="Leave empty to keep current"></label>
            <button type="submit" class="btn btn-primary neon">Save Changes</button>
          </form>
        </div>
        
        <div class="panel glass" style="margin-top:16px">
          <h3>XRAY SETTINGS</h3>
          <div class="setting-row">
            <div class="k">Xray Binary Path</div>
            <div><input class="field" id="set-xray-bin" value="${esc(s.xray_binary_path || '/usr/local/bin/xray')}" style="max-width:400px"></div>
          </div>
          <div class="setting-row">
            <div class="k">Xray Config Path</div>
            <div><input class="field" id="set-xray-cfg" value="${esc(s.xray_config_path || '')}" style="max-width:400px"></div>
          </div>
          <div class="setting-row">
            <div class="k">Internal Port</div>
            <div><input class="field" id="set-xray-port" type="number" value="${s.xray_inbound_port || 24567}" style="max-width:100px"></div>
          </div>
        </div>
      `;
      
      document.getElementById('content').innerHTML = html;
      
      // Save settings
      document.getElementById('set-autorst').onchange = saveSettings;
      document.getElementById('set-title').onchange = saveSettings;
      document.getElementById('set-loglevel').onchange = saveSettings;
      document.getElementById('set-session-timeout').onchange = saveSettings;
      document.getElementById('set-xray-bin').onchange = saveSettings;
      document.getElementById('set-xray-cfg').onchange = saveSettings;
      document.getElementById('set-xray-port').onchange = saveSettings;
      
      document.getElementById('cred-form').onsubmit = async (e) => {
        e.preventDefault();
        const f = Object.fromEntries(new FormData(e.target).entries());
        try {
          await api('/auth/change-credentials', { method: 'POST', body: f });
          toast('Credentials updated');
          e.target.reset();
        } catch (e) { toast(e.message, 'err'); }
      };
      
      async function saveSettings() {
        const payload = {
          auto_restart: document.getElementById('set-autorst').checked,
          panel_title: document.getElementById('set-title').value,
          log_level: document.getElementById('set-loglevel').value,
          session_timeout_minutes: Number(document.getElementById('set-session-timeout').value),
          xray_binary_path: document.getElementById('set-xray-bin').value,
          xray_config_path: document.getElementById('set-xray-cfg').value,
          xray_inbound_port: Number(document.getElementById('set-xray-port').value),
        };
        try {
          await api('/settings', { method: 'PUT', body: payload });
          toast('Settings saved');
        } catch (e) { toast(e.message, 'err'); }
      }
    } catch (e) {
      document.getElementById('content').innerHTML = `<div class="panel glass"><p class="error-text">${e.message}</p></div>`;
    }
  }

  window.initSettings = renderSettings;
</script>
{% endblock %}
