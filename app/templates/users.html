{% extends "base.html" %}
{% block title %}Users - Spider Panel{% endblock %}

{% block content %}
<div id="app-view" class="app-shell">
  <!-- Main content area -->
  <main class="main">
    <header class="topbar glass">
      <h2 id="view-title">Users</h2>
      <div class="topbar-right">
        <span id="xray-status" class="pill">Xray: …</span>
        <span id="me-name" class="me"></span>
      </div>
    </header>

    <div class="content" id="content">
      <!-- Users content loads here -->
    </div>
  </main>

  <!-- Floating Action Button -->
  <button class="fab" id="fab-add-user" aria-label="Add User" title="Add User">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
</div>

<!-- Modal -->
<div id="modal" class="modal-backdrop" hidden>
  <div class="modal glass" id="modal-card"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
// Users view renderer
async function renderUsers() {
  try {
    const users = await api('/users');
    const root = document.getElementById('content');
    
    const rows = users.map(u => `
      <tr>
        <td data-label="Username">${esc(u.username)}</td>
        <td data-label="UUID"><code style="font-size:11px">${esc(u.uuid.slice(0, 8))}…</code></td>
        <td data-label="Status"><span class="badge ${u.status}">${u.status}</span></td>
        <td data-label="Enabled">${u.enabled ? '<span class="pill on">On</span>' : '<span class="pill off">Off</span>'}</td>
        <td data-label="Expire">${u.expire_at ? new Date(u.expire_at).toLocaleDateString() : 'Never'}</td>
        <td data-label="Traffic">${fmtBytes(u.used_traffic_bytes)} / ${fmtBytes(u.traffic_limit_bytes || 0)}</td>
        <td data-label="Actions">
          <div class="row-actions">
            <button class="btn btn-sm btn-min" data-act="qr" data-id="${u.id}" title="QR Code"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></button>
            <button class="btn btn-sm btn-min" data-act="copycfg" data-id="${u.id}" title="Copy Config"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
            <button class="btn btn-sm btn-min" data-act="copysub" data-id="${u.id}" title="Copy Subscription"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></button>
            <button class="btn btn-sm" data-act="edit" data-id="${u.id}" title="Edit"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
            <button class="btn btn-sm" data-act="reset" data-id="${u.id}" title="Reset UUID"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 4L14 8"/><path d="M14 8H8a2 2 0 0 0-2 2v8"/><path d="M18 4v8a2 2 0 0 1-2 2h-8"/></svg></button>
            <button class="btn btn-sm ${u.enabled ? '' : 'btn-ok'}" data-act="toggle" data-id="${u.id}" data-en="${u.enabled}" title="${u.enabled ? 'Disable' : 'Enable'}">${u.enabled ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>' : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>'}</button>
            <button class="btn btn-sm" data-act="sessions" data-id="${u.id}" title="Sessions"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 18a5 5 0 0 0-10 0"/><path d="M12 2v20"/><path d="M22 12a5 5 0 0 1-5 5"/><path d="M2 12a5 5 0 0 0 5 5"/></svg></button>
            <button class="btn btn-sm btn-ghost danger" data-act="del" data-id="${u.id}" title="Delete"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
          </div>
        </td>
      </tr>
    `).join('');
    
    root.innerHTML = `
      <div class="panel glass">
        <div class="panel-head">
          <h3>USERS</h3>
          <span class="spacer"></span>
          <input id="user-search" class="field" style="margin:0;max-width:200px" placeholder="search…" />
        </div>
        <table class="table">
          <thead>
            <tr>
              <th>Username</th>
              <th>UUID</th>
              <th>Status</th>
              <th>Enabled</th>
              <th>Expire</th>
              <th>Traffic</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>${rows || `<tr><td colspan="7" class="muted">No users yet</td></tr>`}</tbody>
        </table>
      </div>
    `;
    
    // Search
    root.querySelector('#user-search').oninput = async (e) => {
      const q = e.target.value.trim();
      const list = await api('/users' + (q ? `?search=${encodeURIComponent(q)}` : ''));
      const tb = root.querySelector('tbody');
      tb.innerHTML = list.map(userRowInner).join('') || `<tr><td colspan="7" class="muted">No users</td></tr>`;
      bindUserRows(root);
    };
    
    bindUserRows(root);
    
    // FAB button
    document.getElementById('fab-add-user').onclick = () => userForm(null);
    
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="panel glass"><p class="error-text">${e.message}</p></div>`;
  }
}

function userRowInner(u) {
  return `<tr>
      <td data-label="Username">${esc(u.username)}</td>
      <td data-label="UUID"><code style="font-size:11px">${esc(u.uuid.slice(0, 8))}…</code></td>
      <td data-label="Status"><span class="badge ${u.status}">${u.status}</span></td>
      <td data-label="Enabled">${u.enabled ? '<span class="pill on">On</span>' : '<span class="pill off">Off</span>'}</td>
      <td data-label="Expire">${u.expire_at ? new Date(u.expire_at).toLocaleDateString() : 'Never'}</td>
      <td data-label="Traffic">${fmtBytes(u.used_traffic_bytes)} / ${u.traffic_limit_bytes ? fmtBytes(u.traffic_limit_bytes) : '∞'}</td>
      <td data-label="Actions"><div class="row-actions">
        <button class="btn btn-sm btn-min" data-act="qr" data-id="${u.id}" title="QR Code"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></button>
        <button class="btn btn-sm btn-min" data-act="copycfg" data-id="${u.id}" title="Copy Config"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
        <button class="btn btn-sm btn-min" data-act="copysub" data-id="${u.id}" title="Copy Subscription"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></button>
        <button class="btn btn-sm" data-act="edit" data-id="${u.id}" title="Edit"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="btn btn-sm" data-act="reset" data-id="${u.id}" title="Reset UUID"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 4L14 8"/><path d="M14 8H8a2 2 0 0 0-2 2v8"/><path d="M18 4v8a2 2 0 0 1-2 2h-8"/></svg></button>
        <button class="btn btn-sm ${u.enabled ? '' : 'btn-ok'}" data-act="toggle" data-id="${u.id}" data-en="${u.enabled}" title="${u.enabled ? 'Disable' : 'Enable'}">${u.enabled ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>' : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>'}</button>
        <button class="btn btn-sm" data-act="sessions" data-id="${u.id}" title="Sessions"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 18a5 5 0 0 0-10 0"/><path d="M12 2v20"/><path d="M22 12a5 5 0 0 1-5 5"/><path d="M2 12a5 5 0 0 0 5 5"/></svg></button>
        <button class="btn btn-sm btn-ghost danger" data-act="del" data-id="${u.id}" title="Delete"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
      </div></td></tr>`;
}

function bindUserRows(root) {
  root.querySelectorAll('[data-act]').forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.id;
      try {
        if (btn.dataset.act === 'qr') showUserQR(Number(id));
        else if (btn.dataset.act === 'copycfg') {
          const u = await api(`/users/${id}`);
          const d = await api(`/sub/${u.uuid}?format=json`);
          copyText(d.uris.join('\n'), 'Config copied');
        }
        else if (btn.dataset.act === 'copysub') {
          const u = await api(`/users/${id}`);
          copyText(location.origin + '/sub/' + u.uuid, 'Subscription copied');
        }
        else if (btn.dataset.act === 'edit') userForm(Number(id));
        else if (btn.dataset.act === 'reset') {
          await api(`/users/${id}/reset-uuid`, { method: 'POST' });
          toast('UUID reset');
          renderUsers();
        }
        else if (btn.dataset.act === 'toggle') {
          await api(`/users/${id}/${btn.dataset.en === 'true' ? 'disable' : 'enable'}`, { method: 'POST' });
          toast('Updated');
          renderUsers();
        }
        else if (btn.dataset.act === 'del') {
          if (!confirm('Delete this user?')) return;
          await api(`/users/${id}`, { method: 'DELETE' });
          toast('User deleted');
          renderUsers();
        }
        else if (btn.dataset.act === 'sessions') showSessions(Number(id));
      } catch (e) { toast(e.message, 'err'); }
    };
  });
}

async function showUserQR(id) {
  const u = await api(`/users/${id}`);
  const d = await api(`/sub/${u.uuid}?format=json`).catch(() => ({ uris: [] }));
  const cfg = d.uris[0] || '';
  openModal(`<h3>QR — ${esc(u.username)}</h3>
    <div style="display:flex;justify-content:center;padding:12px">
      <img src="/api/qr/${esc(u.uuid)}" alt="qr" style="width:240px;height:240px;background:#fff;border-radius:12px" />
    </div>
    <div class="field"><label>VLESS URI</label><textarea class="codebox" readonly style="min-height:90px">${esc(cfg)}</textarea></div>
    <div class="field"><label>Subscription URL</label><input readonly value="${esc(location.origin + '/sub/' + u.uuid)}" class="codebox"></div>
    <div class="modal-actions">
      <button class="btn" data-c="1">Copy Config</button>
      <button class="btn" data-s="1">Copy Sub</button>
      <button class="btn modal-close">Close</button>
    </div>`);
  document.querySelector('#modal-card [data-c]').onclick = () => copyText(cfg, 'Config copied');
  document.querySelector('#modal-card [data-s]').onclick = () => copyText(location.origin + '/sub/' + u.uuid, 'Sub copied');
}

function userForm(uuid) {
  const isEdit = !!uuid;
  const modal = document.getElementById('modal');
  const card = document.getElementById('modal-card');
  
  if (isEdit) {
    api(`/users/${uuid}`).then(u => {
      card.innerHTML = buildUserForm(u);
      bindForm(uuid);
      modal.hidden = false;
    }).catch(e => toast(e.message, 'err'));
  } else {
    card.innerHTML = buildUserForm({});
    bindForm(null);
    modal.hidden = false;
  }
}

function buildUserForm(u) {
  return `
    <h3>${u.id ? 'EDIT USER' : 'CREATE USER'}</h3>
    <form id="user-f" style="display:flex;flex-direction:column;gap:12px">
      ${!u.id ? `<div class="field"><label>Username<input type="text" name="username" value="${esc(u.username || '')}" required></label></div>` : ''}
      <div class="field"><label>Password (leave blank to keep/generate)<input type="password" name="password" placeholder="${u.id ? '••••••••' : 'auto-generate if empty'}"></label></div>
      <div class="field-row">
        <div class="field"><label>Expire (days, 0 = never)<input name="expire_days" type="number" min="0" placeholder="0 = never"></label></div>
        <div class="field"><label>Traffic limit (GB)<input name="traffic_limit_gb" type="number" min="0" step="0.1" value="${u.traffic_limit_gb || 0}"></label></div>
      </div>
      <div class="field-row">
        <div class="field"><label>IP limit (0=∞)<input name="ip_limit" type="number" min="0" value="${u.ip_limit || 0}"></label></div>
        <div class="field"><label>Inbound Tags (comma separated, empty = all)<input name="inbound_tags" value="${esc((u.inbound_tags || []).join ? u.inbound_tags.join(',') : esc(u.inbound_tags || ''))}"></label></div>
      </div>
      <div class="field-row">
        <label class="switch">
          <input type="checkbox" name="enabled" ${u.enabled !== false ? 'checked' : ''}>
          <span class="slider"></span>
        </label>
        <span class="k">Enabled</span>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost modal-close">Cancel</button>
        <button type="submit" class="btn btn-primary neon">${u.id ? 'Save' : 'Create'}</button>
      </div>
    </form>
  `;
}

function bindForm(uuid) {
  const modal = document.getElementById('modal');
  const form = document.getElementById('user-f');
  const isEdit = !!uuid;
  
  modal.querySelector('.modal-close').onclick = () => { modal.hidden = true; };
  
  form.onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const body = {
      expire_days: fd.get('expire_days') ? Number(fd.get('expire_days')) : null,
      traffic_limit_gb: Number(fd.get('traffic_limit_gb') || 0),
      ip_limit: Number(fd.get('ip_limit') || 0),
      enabled: fd.get('enabled') === 'on',
      inbound_tags: fd.get('inbound_tags') ? fd.get('inbound_tags').split(',').map(s => s.trim()).filter(Boolean) : [],
    };
    const pwd = fd.get('password');
    if (pwd) body.password = pwd;
    const exp = fd.get('expire_days');
    if (exp) body.expire_days = Number(exp);
    
    try {
      if (isEdit) {
        await api(`/users/${uuid}`, { method: 'PUT', body });
        toast('User updated');
      } else {
        body.username = fd.get('username');
        await api('/users', { method: 'POST', body });
        toast('User created');
      }
      modal.hidden = true;
      renderUsers();
    } catch (e) { toast(e.message, 'err'); }
  };
}

async function showSessions(id) {
  const [u] = await api(`/users/${id}`).catch(() => [null]);
  const sessions = await api(`/users/${id}/sessions`);
  openModal(`<h3>SESSIONS — ${esc(u ? u.username : id)}</h3>
    <table class="table"><thead><tr><th>IP</th><th>Connected</th><th>Last seen</th></tr></thead>
    <tbody>${sessions.map(s => `<tr><td>${esc(s.ip)}</td><td>${fmtDate(s.connected_at)}</td><td>${fmtDate(s.last_seen)}</td></tr>`).join('') || `<tr><td colspan="3" class="muted">No active sessions</td></tr>`}</tbody></table>
    <div class="modal-actions"><button class="btn modal-close">Close</button></div>`);
}

window.initUsers = renderUsers;
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => renderUsers());
} else {
  renderUsers();
}

</script>
{% endblock %}
