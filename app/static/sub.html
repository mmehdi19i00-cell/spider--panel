<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0000" />
  <title>Spider Panel — Subscription</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cg stroke='%23ff1a3c' stroke-width='2' fill='none' stroke-linecap='round'%3E%3Cpath d='M16 16 L6 7 M16 16 L4 16 M16 16 L6 25 M16 16 L26 7 M16 16 L28 16 M16 16 L26 25'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%23ff1a3c'/%3E%3C/svg%3E" />
</head>
<body>
  <!-- Floating Telegram button (top-center) + contact popup -->
  <div class="tg-wrap" id="tg-wrap">
    <button class="tg-fab" id="tg-fab" aria-expanded="false" aria-controls="tg-popup" title="Open contact links">
      <span class="tg-fab-ico" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l10.66-4.12c.73-.33 1.43.18 1.15 1.3l-2.32 10.94c-.21 1.02-.85 1.27-1.73.78l-3.46-2.55-1.57 1.51c-.17.17-.31.31-.62.31z"/></svg>
      </span>
      <span class="tg-fab-pulse" aria-hidden="true"></span>
    </button>
    <div class="tg-popup" id="tg-popup" role="dialog" aria-label="Contact links" hidden>
      <div class="tg-popup-head">
        <span>Connect with us</span>
        <button class="tg-popup-x" id="tg-popup-x" aria-label="Close">&times;</button>
      </div>
      <a class="tg-link" href="https://t.me/amirsplder" target="_blank" rel="noopener noreferrer">
        <span class="tg-link-ico tg-dev" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l10.66-4.12c.73-.33 1.43.18 1.15 1.3l-2.32 10.94c-.21 1.02-.85 1.27-1.73.78l-3.46-2.55-1.57 1.51c-.17.17-.31.31-.62.31z"/></svg>
        </span>
        <span class="tg-link-txt"><span class="tg-link-title">Telegram Developer</span><span class="tg-link-sub">@amirsplder</span></span>
      </a>
      <a class="tg-link" href="https://t.me/spider_vpn1" target="_blank" rel="noopener noreferrer">
        <span class="tg-link-ico tg-chan" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l10.66-4.12c.73-.33 1.43.18 1.15 1.3l-2.32 10.94c-.21 1.02-.85 1.27-1.73.78l-3.46-2.55-1.57 1.51c-.17.17-.31.31-.62.31z"/></svg>
        </span>
        <span class="tg-link-txt"><span class="tg-link-title">Telegram Channel</span><span class="tg-link-sub">@spider_vpn1</span></span>
      </a>
      <a class="tg-link" href="https://github.com/amirappleidfd-stack" target="_blank" rel="noopener noreferrer">
        <span class="tg-link-ico tg-gh" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.5a10.5 10.5 0 00-3.32 20.46c.53.1.72-.23.72-.5l-.01-1.77c-2.92.63-3.54-1.41-3.54-1.41-.48-1.22-1.17-1.54-1.17-1.54-.95-.65.07-.64.07-.64 1.06.07 1.62 1.09 1.62 1.09.94 1.61 2.47 1.15 3.07.88.1-.68.37-1.15.67-1.41-2.33-.27-4.78-1.17-4.78-5.18 0-1.15.41-2.08 1.09-2.82-.11-.27-.47-1.34.1-2.79 0 0 .89-.29 2.92 1.08a10.1 10.1 0 015.32 0c2.03-1.37 2.92-1.08 2.92-1.08.57 1.45.21 2.52.1 2.79.68.74 1.09 1.67 1.09 2.82 0 4.02-2.46 4.9-4.8 5.16.38.33.71.97.71 1.96l-.01 2.9c0 .28.19.61.73.5A10.5 10.5 0 0012 1.5z"/></svg>
        </span>
        <span class="tg-link-txt"><span class="tg-link-title">GitHub</span><span class="tg-link-sub">amirappleidfd-stack</span></span>
      </a>
    </div>
  </div>

  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <main class="sub-wrap">
    <header class="sub-head">
      <div class="brand-mini"><span class="spider-mini" aria-hidden="true">
        <svg viewBox="0 0 100 100" width="26" height="26"><g stroke="currentColor" stroke-width="6" fill="none" stroke-linecap="round"><path d="M50 50 L18 22 M50 50 L14 50 M50 50 L18 78 M50 50 L82 22 M50 50 L86 50 M50 50 L82 78"/></g><circle cx="50" cy="50" r="13" fill="currentColor"/></svg>
      </span> SPIDER PANEL</div>
      <h1 class="title-neon">YOUR CONNECTION</h1>
      <p class="muted">Open this page from your client's link, or paste your subscription ID below.</p>
      <form id="sub-form" class="sub-form glass">
        <input id="sub-input" placeholder="subscription id (uuid)" autocomplete="off" />
        <button type="submit" class="btn btn-primary neon">Open</button>
      </form>
    </header>

    <div id="content"><!-- rendered here --></div>

    <footer class="sub-foot muted">Spider Panel · VLESS / Reality · Xray Core</footer>
  </main>

  <!-- Modal (self-contained; this page is served raw, not via base.html) -->
  <div id="modal" class="modal-backdrop" hidden>
    <div class="modal glass" id="modal-card"></div>
  </div>

  <script>
  (() => {
    "use strict";
    const $ = (s) => document.querySelector(s);
    const API = "/api";
    const root = $("#content");

    function esc(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, (c) =>
        ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
    }
    function fmtBytes(n) {
      n = Number(n) || 0;
      const u = ["B","KB","MB","GB","TB","PB"];
      let i = 0;
      while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
      return `${n.toFixed(2)} ${u[i]}`;
    }
    function fmtDate(d) {
      if (!d) return "—";
      try { return new Date(d).toLocaleString(); } catch { return String(d); }
    }
    function timeLeft(expire_at) {
      if (!expire_at) return { text: "No expiry", days: Infinity };
      const ms = new Date(expire_at).getTime() - Date.now();
      if (ms <= 0) return { text: "EXPIRED", days: -1 };
      const days = Math.floor(ms / 86400000);
      const hrs = Math.floor((ms % 86400000) / 3600000);
      return { text: `${days}d ${hrs}h left`, days };
    }
    function toast(msg, kind) {
      let t = $("#toast");
      if (!t) { t = document.createElement("div"); t.id = "toast"; t.className = "toast glass"; document.body.appendChild(t); }
      t.textContent = msg; t.className = `toast glass ${kind || "ok"} show`;
      clearTimeout(t._tm); t._tm = setTimeout(() => t.classList.remove("show"), 2600);
    }
    function copy(text, label) {
      navigator.clipboard.writeText(text).then(() => toast(label || "Copied")).catch(() => toast("Copy failed", "err"));
    }

    // Modal helpers (self-contained — this page is served raw, not via base.html)
    function openModal(html) {
      const card = document.getElementById("modal-card");
      const backdrop = document.getElementById("modal");
      if (!card || !backdrop) return;
      card.innerHTML = html;
      backdrop.hidden = false;
    }
    function closeModal() {
      const card = document.getElementById("modal-card");
      const backdrop = document.getElementById("modal");
      if (backdrop) backdrop.hidden = true;
      if (card) card.innerHTML = "";
    }
    document.addEventListener("click", (e) => {
      if (e.target.id === "modal") closeModal();
      if (e.target.classList && e.target.classList.contains("modal-close")) closeModal();
    });

    function getUUID() {
      const m = location.pathname.match(/\/sub\/([^/]+)/);
      return m ? decodeURIComponent(m[1]) : "";
    }

    async function load(uuid) {
      root.innerHTML = `<div class="muted" style="padding:30px;text-align:center">Loading…</div>`;
      try {
        const r = await fetch(`/sub/${encodeURIComponent(uuid)}?format=json`, { headers: { Accept: "application/json" } });
        if (!r.ok) { showError(r.status === 404 ? "Subscription not found." : "Failed to load subscription."); return; }
        const data = await r.json();
        render(data);
      } catch (e) { showError(e.message); }
    }

    function showError(msg) {
      root.innerHTML = `<div class="panel glass" style="margin-top:24px"><p class="error-text">${esc(msg)}</p>
        <p class="muted">Check the ID, or paste it above.</p></div>`;
    }

    function render(d) {
      const tl = timeLeft(d.expire_at);
      const used = d.used_traffic_bytes || 0;
      const limit = d.traffic_limit_bytes || 0;
      const pct = limit > 0 ? Math.min(100, (used / limit) * 100) : 0;
      const expired = tl.days < 0 || d.status === "expired" || !d.enabled;

      const subUrl = location.origin + "/sub/" + d.uuid;

      const cards = [
        ["Status", expired ? `<span class="pill off">${esc(d.status || "disabled")}</span>` : `<span class="pill on">ACTIVE</span>`],
        ["Time left", `<span class="${tl.days < 0 ? "bad" : "ok"}">${esc(tl.text)}</span>`],
        ["Expires", fmtDate(d.expire_at)],
        ["Traffic", `${fmtBytes(used)} / ${limit ? fmtBytes(limit) : "∞"}`],
        ["IP Limit", d.ip_limit ? String(d.ip_limit) : "∞"],
      ].map(([k, v]) => `<div class="card glass"><div class="k">${k}</div><div class="v">${v}</div></div>`).join("");

      const boxes = d.uris.map((uri, i) => {
        const u = new URL(uri);
        const q = u.searchParams;
        const params = ["type","security","sni","pbk","sid","fp","path","mode"]
          .filter((k) => q.get(k)).map((k) => `<div class="kv"><span>${esc(k)}</span><code>${esc(q.get(k))}</code></div>`).join("");
        return `<div class="cfg glass">
          <div class="cfg-top">
            <span class="cfg-idx">#${i + 1}</span>
            <span class="cfg-type">${esc(q.get("type") || "?")} / ${esc(q.get("security") || "?")}</span>
            <button class="btn btn-sm" data-copy="${esc(uri)}">Copy VLESS</button>
          </div>
          <pre class="cfg-uri">${esc(uri)}</pre>
          <details class="cfg-details"><summary>Connection details</summary>${params || "<p class='muted'>—</p>"}</details>
        </div>`;
      }).join("");

      root.innerHTML = `
        <div class="panel glass" style="margin-top:24px">
          <div class="row-between">
            <h3>ACCOUNT · ${esc(d.username)}</h3>
            <span id="ping-badge" class="pill">ping…</span>
          </div>
          <div class="grid cards">${cards}</div>
          ${limit > 0 ? `<div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
            <div class="muted" style="font-size:12px">${pct.toFixed(1)}% used</div>` : ""}
          <div class="row-actions" style="margin-top:12px">
            <button class="btn btn-sm" id="ping-btn">Ping config</button>
            <button class="btn btn-sm" id="copy-all">Copy VLESS all</button>
          </div>
        </div>

        <div class="panel glass" style="margin-top:16px">
          <h3>VLESS CONFIGS</h3>
          ${boxes || `<p class="muted">No active configs.</p>`}
        </div>

        <div class="panel glass" style="margin-top:16px">
          <div class="row-between"><h3>SUBSCRIPTION</h3>
            <button class="btn btn-sm" data-copy="${esc(subUrl)}">Copy Sub</button>
          </div>
          <div class="field" style="margin-top:10px">
            <label>Subscription URL (VLESS / Clash / Sing-box / Hiddify)</label>
            <input class="codebox" readonly value="${esc(subUrl)}" />
          </div>
          <p class="muted" style="font-size:12px">Import this URL directly into Clash, Sing-box, Hiddify, v2rayNG, NekoBox or Streisand — all clients read the same subscription.</p>
        </div>

        <div class="panel glass" style="margin-top:16px">
          <h3>QR CODE</h3>
          <div class="qr-wrap" style="display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-top:8px">
            ${d.uris.map((uri, i) => `<img class="qr" src="/api/qr/${esc(d.uuid)}/raw?index=${i}" alt="qr ${i+1}" style="width:160px;height:160px;background:#fff;border-radius:12px" />`).join("")}
          </div>
        </div>

        <div class="panel glass" style="margin-top:16px">
          <h3>HOW TO CONNECT</h3>
          <ol class="steps">
            <li>Install a VLESS client (v2rayNG / Shadowrocket / NekoBox / Streisand / Clash / Sing-box).</li>
            <li>Scan a <b>QR code</b> above, or tap <b>Copy VLESS</b> on a config (or <b>Copy Sub</b> for the whole subscription).</li>
            <li>Import via "Import from clipboard / URI / QR / Subscription URL" — Reality needs the <code>sni</code>, <code>pbk</code> and <code>sid</code> shown in details.</li>
            <li>Enable the profile and connect. Green ping above means the server answers.</li>
          </ol>
        </div>`;

      root.querySelectorAll("[data-copy]").forEach((b) => b.onclick = () => copy(b.dataset.copy, "Config copied"));
      $("#copy-all").onclick = () => copy(d.uris.join("\n"), "All configs copied");
      $("#ping-btn").onclick = () => doPing(d.uuid);
      doPing(d.uuid);
    }

    async function doPing(uuid) {
      const badge = $("#ping-badge");
      if (badge) { badge.textContent = "ping…"; badge.className = "pill"; }
      try {
        const r = await fetch(`/sub/${encodeURIComponent(uuid)}/ping`, { headers: { Accept: "application/json" } });
        const j = await r.json();
        if (badge) {
          if (j.ok) { badge.textContent = `${j.ms} ms`; badge.className = "pill on"; }
          else { badge.textContent = "unreachable"; badge.className = "pill off"; }
        }
      } catch (e) {
        if (badge) { badge.textContent = "ping error"; badge.className = "pill off"; }
      }
    }

    // boot
    const initial = getUUID();
    if (initial) { $("#sub-input").value = initial; load(initial); }
    $("#sub-form").onsubmit = (e) => {
      e.preventDefault();
      const v = $("#sub-input").value.trim();
      if (!v) return;
      history.replaceState(null, "", `/sub/${v}`);
      load(v);
    };

    // Telegram popup toggle (top-center button)
    const tgFab = document.getElementById("tg-fab");
    const tgPopup = document.getElementById("tg-popup");
    const tgX = document.getElementById("tg-popup-x");
    if (tgFab && tgPopup) {
      const open = () => { tgPopup.hidden = false; tgFab.setAttribute("aria-expanded", "true"); };
      const close = () => { tgPopup.hidden = true; tgFab.setAttribute("aria-expanded", "false"); };
      tgFab.onclick = () => { tgPopup.hidden ? open() : close(); };
      if (tgX) tgX.onclick = (e) => { e.stopPropagation(); close(); };
      document.addEventListener("click", (e) => {
        if (!tgPopup.hidden && !tgPopup.contains(e.target) && e.target !== tgFab && !tgFab.contains(e.target)) close();
      });
      document.addEventListener("keydown", (e) => { if (e.key === "Escape") close(); });
    }
  })();
  </script>

  <style>
    .sub-wrap { max-width: 820px; margin: 0 auto; padding: 28px 16px 60px; }
    .sub-head { text-align: center; }
    .brand-mini { display:flex; align-items:center; justify-content:center; gap:8px; letter-spacing: 2px; color: var(--neon); font-weight: 700; }
    .brand-mini .spider-mini { color: var(--neon); filter: drop-shadow(0 0 8px var(--neon)); display:inline-flex; }
    .sub-form { display: flex; gap: 10px; max-width: 520px; margin: 16px auto 0; padding: 12px; }
    .sub-form input { flex: 1; }
    .row-between { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .grid.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 12px; }
    .bar { height: 10px; border-radius: 999px; background: rgba(255,26,60,.15); overflow: hidden; margin-top: 12px; border: 1px solid var(--glass-brd); }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--neon), var(--neon-soft)); box-shadow: var(--shadow-neon); }
    .cfg { padding: 14px; margin-top: 12px; }
    .cfg-top { display: flex; align-items: center; gap: 10px; }
    .cfg-idx { color: var(--neon); font-weight: 700; }
    .cfg-type { flex: 1; color: var(--txt-dim); font-size: 13px; }
    .cfg-uri { white-space: pre-wrap; word-break: break-all; background: rgba(0,0,0,.35); border: 1px solid var(--glass-brd);
      border-radius: 10px; padding: 10px; font-size: 12px; margin: 10px 0; color: var(--neon-soft); }
    .cfg-details summary { cursor: pointer; color: var(--txt-dim); font-size: 13px; }
    .kv { display: flex; gap: 8px; padding: 4px 0; border-bottom: 1px dashed rgba(255,26,60,.12); font-size: 12px; }
    .kv span { width: 70px; color: var(--txt-dim); text-transform: uppercase; }
    .kv code { color: var(--txt); word-break: break-all; }
    .steps { margin: 8px 0 0; padding-left: 18px; line-height: 1.7; font-size: 14px; }
    .steps code { color: var(--neon-soft); }
    .sub-foot { text-align: center; margin-top: 30px; font-size: 12px; }
    .toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px); opacity: 0;
      padding: 10px 18px; border-radius: 12px; transition: .25s; z-index: 50; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Telegram button (top-center) + contact popup */
    .tg-wrap { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 85;
      display: flex; flex-direction: column; align-items: center; }
    .tg-fab { position: relative; width: 54px; height: 54px; border-radius: 50%;
      border: 1px solid rgba(120, 200, 255, 0.45); background: linear-gradient(145deg, #2bb7ff, #0099ff);
      color: #fff; cursor: pointer; display: grid; place-items: center;
      box-shadow: 0 6px 22px rgba(0,0,0,.35), 0 0 14px rgba(0,153,255,.55), 0 0 28px rgba(0,153,255,.30);
      transition: transform .25s ease, box-shadow .25s ease; animation: tgGlow 4.2s ease-in-out infinite; }
    .tg-fab:hover, .tg-fab:focus-visible { transform: scale(1.08); outline: none;
      box-shadow: 0 8px 28px rgba(0,0,0,.4), 0 0 22px rgba(0,153,255,.8), 0 0 44px rgba(0,153,255,.5); }
    .tg-fab[aria-expanded="true"] { animation-play-state: paused; transform: scale(1.05); }
    .tg-fab-ico, .tg-fab-ico svg { width: 26px; height: 26px; display: block; }
    .tg-fab-pulse { position: absolute; inset: -4px; border-radius: 50%; border: 2px solid rgba(0,153,255,.55);
      animation: tgPulse 2.4s ease-out infinite; pointer-events: none; }
    @keyframes tgPulse { 0% { transform: scale(0.9); opacity: .8; } 70%,100% { transform: scale(1.5); opacity: 0; } }
    @keyframes tgGlow { 0%,100% { box-shadow: 0 6px 22px rgba(0,0,0,.35), 0 0 12px rgba(0,153,255,.45), 0 0 24px rgba(0,153,255,.25); }
      50% { box-shadow: 0 6px 22px rgba(0,0,0,.35), 0 0 18px rgba(0,153,255,.7), 0 0 36px rgba(0,153,255,.4); } }
    .tg-popup { position: absolute; top: 66px; width: 280px; max-width: calc(100vw - 32px); padding: 10px;
      border-radius: 16px; background: var(--glass); border: 1px solid var(--glass-brd);
      backdrop-filter: blur(16px) saturate(140%); -webkit-backdrop-filter: blur(16px) saturate(140%);
      box-shadow: var(--shadow-neon); animation: tgPop .22s cubic-bezier(.2,.7,.2,1); transform-origin: top center; }
    @keyframes tgPop { from { opacity: 0; transform: translateY(-8px) scale(.96); } to { opacity: 1; transform: none; } }
    .tg-popup[hidden] { display: none; }
    .tg-popup-head { display: flex; align-items: center; justify-content: space-between; padding: 6px 6px 10px;
      font-size: 13px; letter-spacing: 1px; color: var(--txt); text-transform: uppercase;
      border-bottom: 1px solid rgba(255,26,60,.12); margin-bottom: 8px; }
    .tg-popup-x { background: transparent; border: none; color: var(--txt-dim); font-size: 20px; line-height: 1; cursor: pointer; padding: 0 4px; }
    .tg-popup-x:hover { color: var(--bad); }
    .tg-link { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 12px;
      text-decoration: none; color: var(--txt); transition: background .18s, transform .12s; }
    .tg-link:hover { background: rgba(0,153,255,.12); transform: translateX(2px); }
    .tg-link-ico { flex: 0 0 auto; width: 38px; height: 38px; border-radius: 12px; display: grid; place-items: center;
      color: #fff; box-shadow: 0 0 10px rgba(0,0,0,.25); }
    .tg-link-ico svg { width: 22px; height: 22px; }
    .tg-dev { background: linear-gradient(145deg, #2bb7ff, #0099ff); }
    .tg-chan { background: linear-gradient(145deg, #36c5ff, #1f8fff); }
    .tg-gh { background: linear-gradient(145deg, #2b2b32, #111114); }
    .tg-link-txt { display: flex; flex-direction: column; line-height: 1.2; min-width: 0; }
    .tg-link-title { font-size: 14px; font-weight: 700; }
    .tg-link-sub { font-size: 12px; color: #7fd3ff; }
    @media (max-width: 430px) { .tg-wrap { top: 12px; } .tg-fab { width: 48px; height: 48px; } .tg-popup { width: 260px; } }
    @media (max-width: 360px) { .tg-wrap { top: 10px; } .tg-fab { width: 44px; height: 44px; } .tg-popup { width: 240px; } }
  </style>
</body>
</html>
